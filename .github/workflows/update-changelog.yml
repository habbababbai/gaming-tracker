name: Update Changelog

on:
  push:
    branches: [main]

jobs:
  update-changelog:
    name: Generate and Update Changelogs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate changelog entries
        run: bun run changelog:generate

      - name: Commit and push changelog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are any changes to commit
          if git diff --quiet; then
            echo "✅ No changelog changes to commit"
          else
            echo "📝 Committing changelog updates..."
            git add "*/CHANGELOG.md"
            git commit -m "[CONFIG] - Update changelogs from main merge"
            git push
            echo "✅ Changelog updates pushed to main"
          fi
