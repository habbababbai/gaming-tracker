name: Update Changelog

on:
  push:
    branches: [main]

jobs:
  update-changelog:
    name: Generate and Update Changelogs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate changelog entries
        run: bun run changelog:generate

      - name: Create PR with changelog updates
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[CONFIG] - Update changelogs from main merge"
          title: "[CONFIG] - Update changelogs"
          body: |
            Automated changelog update from merged commits.
            This PR updates CHANGELOG.md files for apps with changes in the latest merge.
          branch: changelog-update
          delete-branch: true
          labels: "automated"
