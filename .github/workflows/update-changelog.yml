name: Update Changelog

# Only when a PR is merged to main (not on every push). Skip when the merged PR is this bot's own changelog PR.
on:
  pull_request:
    types: [closed]
    branches: [main]

# Only one run at a time; avoids two merges racing and the second overwriting the first's PR branch.
concurrency:
  group: changelog-update
  cancel-in-progress: false

jobs:
  update-changelog:
    name: Generate and Update Changelogs
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref != 'changelog-update'
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate changelog entries
        run: bun run changelog:generate -- --since-commit ${{ github.event.pull_request.base.sha }}

      - name: Check for changelog changes
        id: changes
        run: |
          if git diff --quiet; then echo "changed=false" >> $GITHUB_OUTPUT; else echo "changed=true" >> $GITHUB_OUTPUT; fi

      - name: Create PR with changelog updates
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[CONFIG] - Update changelogs from main merge"
          title: "[CONFIG] - Update changelogs"
          body: |
            Automated changelog update from merged commits.
            This PR updates CHANGELOG.md files for apps with changes in the latest merge.
          branch: changelog-update
          delete-branch: true
          labels: "automated"
