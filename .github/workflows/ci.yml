name: CI - Code Quality Checks

# Run only on PRs (not on push to main) so we don't run twice (on PR then again on merge).
# Skip checks when PR only touches .md or docs (changelog bot, doc-only).
on:
    pull_request:
        branches: [main, develop]
        paths:
            - "apps/**"
            - "packages/**"
            - "package.json"
            - "bun.lock"
            - "tsconfig.json"
            - "*.config.*"

jobs:
    # Skip CI when only .md / docs changed (changelog PRs, doc-only)
    filter:
        name: Check for code changes
        runs-on: ubuntu-latest
        outputs:
            run_ci: ${{ steps.changes.outputs.run_ci }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - id: changes
              run: |
                  FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD)
                  if echo "$FILES" | grep -qvE '\.(md)$|^docs/'; then echo "run_ci=true" >> $GITHUB_OUTPUT; else echo "run_ci=false" >> $GITHUB_OUTPUT; fi

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: filter
        if: needs.filter.outputs.run_ci == 'true'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: 📦 Generate Prisma client
              run: cd apps/api && bunx prisma generate

            - name: 🔨 Run lint check
              run: bun run lint
              continue-on-error: false

            - name: 💡 Comment on PR if lint issues
              if: failure() && github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `❌ **Lint check failed**\n\nFix linting issues and push again.`
                      })

    type-check:
        name: Type Check
        runs-on: ubuntu-latest
        needs: filter
        if: needs.filter.outputs.run_ci == 'true'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: 🎯 TypeScript type check
              run: bun run type-check || echo "Type check not configured, skipping"
              continue-on-error: true

    tests:
        name: Unit Tests
        runs-on: ubuntu-latest
        needs: filter
        if: needs.filter.outputs.run_ci == 'true'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: 📦 Generate Prisma client
              run: cd apps/api && bunx prisma generate

            - name: 🧪 Run unit tests with coverage
              run: cd apps/api && bun run test:cov

    security:
        name: Security Check
        runs-on: ubuntu-latest
        needs: filter
        if: needs.filter.outputs.run_ci == 'true'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: 🔒 Check for vulnerabilities
              run: bun audit 2>/dev/null || echo "Audit skipped"
              continue-on-error: true

    build:
        name: Build Check
        runs-on: ubuntu-latest
        needs: filter
        if: needs.filter.outputs.run_ci == 'true'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: 🏗️ Build all apps
              run: bun run build 2>/dev/null || echo "Build check skipped"
              continue-on-error: true

    ci-summary:
        name: CI Summary
        runs-on: ubuntu-latest
        needs: [filter, lint, type-check, tests, security, build]
        if: always()
        steps:
            - name: Check CI Status
              run: |
                  echo "✅ CI Pipeline Summary"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "Lint:          ${{ needs.lint.result }}"
                  echo "Type Check:    ${{ needs.type-check.result }}"
                  echo "Tests:         ${{ needs.tests.result }}"
                  echo "Security:      ${{ needs.security.result }}"
                  echo "Build:         ${{ needs.build.result }}"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            - name: Fail if critical checks failed
              if: needs.lint.result == 'failure' || needs.tests.result == 'failure'
              run: exit 1

            - name: All checks passed
              run: echo "✅ CI pipeline complete"
