name: CI - Code Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Job 1: Lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 📦 Generate Prisma client
        run: cd apps/api && bunx prisma generate

      - name: 🔨 Run lint check
        run: bun run lint
        continue-on-error: false

      - name: 💡 Comment on PR if lint issues
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Lint check failed**\n\nFix linting issues and push again.`
            })

  # Job 2: Type Checking
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 🎯 TypeScript type check
        run: bun run type-check || echo "Type check not configured, skipping"
        continue-on-error: true

  # Job 3: Tests
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 📦 Generate Prisma client
        run: cd apps/api && bunx prisma generate

      - name: 🧪 Run unit tests
        run: bun run test

  # Job 4: Security Check (dependency vulnerabilities)
  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔒 Check for vulnerabilities
        run: bun audit 2>/dev/null || echo "Audit skipped"
        continue-on-error: true

  # Job 5: Build Check
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build all apps
        run: bun run build 2>/dev/null || echo "Build check skipped"
        continue-on-error: true

  # Summary
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, tests, security, build]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "✅ CI Pipeline Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Lint:          ${{ needs.lint.result }}"
          echo "Type Check:    ${{ needs.type-check.result }}"
          echo "Tests:         ${{ needs.tests.result }}"
          echo "Security:      ${{ needs.security.result }}"
          echo "Build:         ${{ needs.build.result }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Fail if critical checks failed
        if: needs.lint.result == 'failure' || needs.tests.result == 'failure'
        run: exit 1

      - name: All checks passed
        run: echo "✅ CI pipeline complete"

